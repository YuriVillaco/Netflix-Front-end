<!DOCTYPE html>
<!-- Página de seleção de perfis inspirado na Netflix -->
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <button id="theme-toggle" type="button" aria-label="Modo escuro ativo. Clique para alternar para modo claro">🌙</button>
    <main>
        <!-- Cabeçalho principal com título da página -->
        <header>
            <h1>Quem está assistindo?</h1>
        </header>

        <!-- Coleção de perfis exibidos em grade responsiva -->
        <section aria-label="Seleção de perfis">
            <!-- Atualize cada href para a página de perfil correspondente -->
            <ul class="profiles">
                <li class="profile">
                    <a href="netflix-plataform-main/netflix-plataform-main/catalogo/catalogo.html" aria-label="Abrir perfil do Yuri">
                        <figure>
                            <img src="assets/Perfil-1.jpg" alt="Avatar do Perfil 1">
                            <figcaption>Yuri</figcaption>
                        </figure>
                    </a>
                </li>

                <li class="profile">
                    <a href="perfil-bruno.html" aria-label="Abrir perfil do Bruno">
                        <figure>
                            <img src="assets/perfil-2.jpg" alt="Avatar do Perfil 2">
                            <figcaption>Bruno</figcaption>
                        </figure>
                    </a>
                </li>

                <li class="profile">
                    <a href="perfil-guilherme.html" aria-label="Abrir perfil do Guilherme">
                        <figure>
                            <img src="assets/Perfil-3.jpg" alt="Avatar do Perfil 3">
                            <figcaption>Guilherme</figcaption>
                        </figure>
                    </a>
                </li>

                <li class="profile">
                    <a href="perfil-carolina.html" aria-label="Abrir perfil da Carolina">
                        <figure>
                            <img src="assets/perfil-4.jpg" alt="Avatar do Perfil 4">
                            <figcaption>Carolina</figcaption>
                        </figure>
                    </a>
                </li>
            </ul>
        </section>
    </main>

    <script>
        const toggleButton = document.getElementById('theme-toggle');
        const rootElement = document.documentElement;
        const bodyElement = document.body;

        function updateThemeText(isLight) {
            toggleButton.textContent = isLight ? '☀️' : '🌙';
            toggleButton.setAttribute('aria-label', isLight ? 'Modo claro ativo. Clique para alternar para modo escuro' : 'Modo escuro ativo. Clique para alternar para modo claro');
        }

        function setTheme(light) {
            bodyElement.classList.toggle('light-theme', light);
            updateThemeText(light);
        }

        toggleButton.addEventListener('click', () => {
            setTheme(!bodyElement.classList.contains('light-theme'));
        });

        const profileLinks = document.querySelectorAll('.profiles a');
        profileLinks.forEach(link => {
            link.addEventListener('click', () => {
                const figure = link.querySelector('figure');
                const img = figure.querySelector('img');
                const caption = figure.querySelector('figcaption');

                localStorage.setItem('perfilAtivoNome', caption.textContent.trim());
                localStorage.setItem('perfilAtivoImagem', img.src);
            });
        });

        // Mantém o último tema selecionado enquanto a página estiver aberta
        setTheme(false);
    </script>
</body>
</html>
